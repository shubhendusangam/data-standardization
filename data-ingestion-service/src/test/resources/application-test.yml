spring:
  application:
    name: data-ingestion-service
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 52MB

eureka:
  client:
    enabled: false

management:
  tracing:
    enabled: false

logging:
  loki:
    url: http://localhost:3100/loki/api/v1/push
  level:
    root: WARN
    com.datastd: INFO

datastandard:
  ingestion:
    max-file-size-bytes: 52428800
    supported-types:
      - text/csv
      - application/vnd.ms-excel
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet

