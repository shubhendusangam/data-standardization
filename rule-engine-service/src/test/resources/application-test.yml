spring:
  application:
    name: rule-engine-service
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

eureka:
  client:
    enabled: false

management:
  tracing:
    enabled: false

logging:
  loki:
    url: http://localhost:3100/loki/api/v1/push
  level:
    root: WARN
    com.datastd: INFO

