server:
  port: 8082

spring:
  application:
    name: rule-engine-service
  datasource:
    url: jdbc:h2:mem:rulesdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10      # heartbeat every 10 s (default 30)
    lease-expiration-duration-in-seconds: 30    # evict after 30 s silence (default 90)

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: w3c,b3

logging:
  loki:
    url: http://localhost:3100/loki/api/v1/push

