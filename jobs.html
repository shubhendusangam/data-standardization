<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jobs — Data Standardization</title>
<style>
/* ── Theme tokens (shared) ────────────────────────────────────── */
:root {
  --color-bg:          #0f1117;
  --color-surface:     #181b23;
  --color-surface-alt: #1e222d;
  --color-border:      #2a2f3e;
  --color-text:        #e1e4ed;
  --color-text-dim:    #8b90a0;
  --color-accent:      #6c8cff;
  --color-accent-glow: rgba(108,140,255,.18);
  --color-green:       #34d399;
  --color-green-dim:   rgba(52,211,153,.15);
  --color-yellow:      #fbbf24;
  --color-yellow-dim:  rgba(251,191,36,.15);
  --color-red:         #f87171;
  --color-red-dim:     rgba(248,113,113,.15);
  --color-orange:      #fb923c;
  --color-purple:      #a78bfa;
  --radius:            10px;
  --radius-sm:         6px;
  --shadow:            0 2px 12px rgba(0,0,0,.35);
  --font-mono:         'SF Mono','Cascadia Code','Fira Code','Consolas',monospace;
  --font-sans:         'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --transition:        .2s ease;
}

/* ── Reset ────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:var(--font-sans);background:var(--color-bg);color:var(--color-text);line-height:1.5;min-height:100vh;padding:24px 32px 48px}

/* ── Header / nav ─────────────────────────────────────────────── */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.header h1{font-size:1.35rem;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:10px}
.header h1 .logo{width:28px;height:28px;background:var(--color-accent);border-radius:7px;display:grid;place-items:center;font-size:.85rem;color:#fff;font-weight:800}
.nav-links{display:flex;gap:8px}
.nav-links a{font-size:.78rem;color:var(--color-text-dim);text-decoration:none;padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--color-border);transition:all var(--transition)}
.nav-links a:hover,.nav-links a.active{color:var(--color-accent);border-color:var(--color-accent);background:var(--color-accent-glow)}

/* ── Panel ────────────────────────────────────────────────────── */
.panel{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius);padding:22px 24px}
.section-title{font-size:.78rem;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-dim);font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--color-border)}

/* ── Buttons ──────────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border:none;border-radius:var(--radius-sm);font-size:.8rem;font-weight:600;cursor:pointer;transition:all var(--transition);font-family:var(--font-sans)}
.btn-primary{background:var(--color-accent);color:#fff}
.btn-primary:hover{filter:brightness(1.15)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed}
.btn-danger{background:var(--color-red-dim);color:var(--color-red);border:1px solid transparent}
.btn-danger:hover{border-color:var(--color-red)}
.btn-ghost{background:transparent;color:var(--color-text-dim);border:1px solid var(--color-border)}
.btn-ghost:hover{color:var(--color-text);border-color:var(--color-text-dim)}
.btn-sm{padding:5px 10px;font-size:.72rem}
.btn-success{background:var(--color-green-dim);color:var(--color-green);border:1px solid transparent}
.btn-success:hover{border-color:var(--color-green)}

/* ── Inputs / selects ─────────────────────────────────────────── */
.field-group{margin-bottom:14px}
.field-group label{display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-dim);font-weight:600;margin-bottom:5px}
input[type=text],input[type=number],select{width:100%;background:var(--color-bg);color:var(--color-text);border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:9px 12px;font-size:.82rem;font-family:var(--font-sans);transition:border-color var(--transition)}
input:focus,select:focus{outline:none;border-color:var(--color-accent)}

/* ── Top bar ──────────────────────────────────────────────────── */
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.top-bar-filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.filter-chip{padding:5px 12px;border-radius:20px;font-size:.72rem;font-weight:600;border:1px solid var(--color-border);background:transparent;color:var(--color-text-dim);cursor:pointer;transition:all var(--transition)}
.filter-chip:hover,.filter-chip.active{border-color:var(--color-accent);color:var(--color-accent);background:var(--color-accent-glow)}

/* ── Job table ────────────────────────────────────────────────── */
.job-table-wrap{overflow-x:auto}
.job-table{width:100%;border-collapse:collapse;font-size:.8rem}
.job-table th{position:sticky;top:0;z-index:1;background:var(--color-surface-alt);font-size:.68rem;text-transform:uppercase;letter-spacing:.04em;color:var(--color-text-dim);font-weight:600;padding:10px 12px;text-align:left;border-bottom:1px solid var(--color-border)}
.job-table td{padding:10px 12px;border-bottom:1px solid var(--color-border);white-space:nowrap;transition:background var(--transition)}
.job-table tr.clickable{cursor:pointer}
.job-table tr.clickable:hover td{background:var(--color-accent-glow)}
.job-table tr.selected td{background:rgba(108,140,255,.08)}

/* ── Status badges ────────────────────────────────────────────── */
.status-badge{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 10px;border-radius:4px;display:inline-block}
.status-badge.QUEUED{background:var(--color-accent-glow);color:var(--color-accent)}
.status-badge.PROCESSING{background:var(--color-yellow-dim);color:var(--color-yellow);animation:pulse-badge 1.8s ease-in-out infinite}
.status-badge.COMPLETED{background:var(--color-green-dim);color:var(--color-green)}
.status-badge.FAILED{background:var(--color-red-dim);color:var(--color-red)}
@keyframes pulse-badge{0%,100%{opacity:1}50%{opacity:.55}}

/* ── Progress bar ─────────────────────────────────────────────── */
.progress-track{height:6px;background:var(--color-bg);border-radius:3px;overflow:hidden;min-width:100px}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--color-accent),var(--color-green));transition:width .4s ease}
.progress-text{font-family:var(--font-mono);font-size:.7rem;color:var(--color-text-dim);margin-top:2px}
.mono{font-family:var(--font-mono);font-size:.76rem}

/* ── Drawer ───────────────────────────────────────────────────── */
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000}
.drawer-overlay.open{display:block}
.drawer{position:fixed;top:0;right:-540px;width:520px;max-width:90vw;height:100vh;background:var(--color-surface);border-left:1px solid var(--color-border);padding:24px;z-index:1001;transition:right .3s ease;overflow-y:auto}
.drawer.open{right:0}
.drawer-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--color-text-dim);font-size:1.2rem;cursor:pointer;transition:color var(--transition)}
.drawer-close:hover{color:var(--color-text)}
.drawer-header{margin-bottom:18px}
.drawer-header h2{font-size:1.05rem;font-weight:700;margin-bottom:4px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.detail-item{background:var(--color-surface-alt);border-radius:var(--radius-sm);padding:10px 12px}
.detail-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-dim);font-weight:600;margin-bottom:2px}
.detail-value{font-size:.84rem;font-weight:600;font-family:var(--font-mono)}
.copy-btn{background:none;border:none;color:var(--color-accent);cursor:pointer;font-size:.72rem;font-weight:600;padding:0;margin-left:6px;transition:opacity var(--transition)}
.copy-btn:hover{opacity:.7}
.error-box{background:var(--color-red-dim);border:1px solid var(--color-red);border-radius:var(--radius-sm);padding:14px;color:var(--color-red);font-family:var(--font-mono);font-size:.78rem;white-space:pre-wrap;word-break:break-word;margin-bottom:16px;max-height:200px;overflow-y:auto}
.export-bar{display:flex;gap:8px;margin-bottom:16px}
.result-table-wrap{overflow:auto;max-height:320px}
.result-table{width:100%;border-collapse:collapse;font-size:.76rem}
.result-table th{position:sticky;top:0;z-index:1;background:var(--color-surface-alt);font-size:.65rem;text-transform:uppercase;letter-spacing:.04em;color:var(--color-text-dim);font-weight:600;padding:6px 10px;text-align:left;border-bottom:1px solid var(--color-border)}
.result-table td{padding:5px 10px;border-bottom:1px solid var(--color-border);white-space:nowrap;font-family:var(--font-mono);font-size:.74rem}

/* ── Modal ────────────────────────────────────────────────────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;justify-content:center;align-items:center}
.modal-overlay.open{display:flex}
.modal{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius);padding:28px;width:600px;max-width:92vw;max-height:88vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.modal-title{font-size:1.1rem;font-weight:700;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;color:var(--color-text-dim);font-size:1.2rem;cursor:pointer}
.step-indicator{display:flex;gap:4px;margin-bottom:18px}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--color-border);transition:background var(--transition)}
.step-dot.active{background:var(--color-accent)}
.step-dot.done{background:var(--color-green)}
.modal-step{display:none}
.modal-step.active{display:block}
.select-card{background:var(--color-surface-alt);border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:12px 14px;cursor:pointer;transition:all var(--transition);margin-bottom:8px}
.select-card:hover{border-color:var(--color-accent)}
.select-card.selected{border-color:var(--color-accent);background:var(--color-accent-glow)}
.select-card .sc-name{font-weight:600;font-size:.84rem}
.select-card .sc-meta{font-size:.7rem;color:var(--color-text-dim);margin-top:2px}
.rule-check{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);transition:background var(--transition)}
.rule-check:hover{background:var(--color-surface-alt)}
.rule-check input[type=checkbox]{accent-color:var(--color-accent);width:16px;height:16px}
.rule-check-label{font-size:.82rem}
.rule-check-type{font-size:.64rem;font-weight:700;text-transform:uppercase;padding:1px 6px;border-radius:3px;margin-left:6px}
.modal-footer{display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:10px}
.or-divider{text-align:center;padding:10px 0;font-size:.72rem;color:var(--color-text-dim);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
#preview-container{margin-top:16px}

/* ── Toast ────────────────────────────────────────────────────── */
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:var(--radius-sm);font-size:.8rem;font-weight:600;box-shadow:var(--shadow);animation:toastIn .3s ease;max-width:380px}
.toast.success{background:var(--color-green-dim);color:var(--color-green);border:1px solid var(--color-green)}
.toast.error{background:var(--color-red-dim);color:var(--color-red);border:1px solid var(--color-red)}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--color-border);border-top-color:var(--color-accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:32px 16px;color:var(--color-text-dim);font-size:.85rem}

/* ── Scrollbar ────────────────────────────────────────────────── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--color-border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--color-text-dim)}
</style>
</head>
<body>

<div class="toast-container" id="toasts"></div>

<!-- ── Detail drawer ──────────────────────────────────────────── -->
<div class="drawer-overlay" id="drawer-overlay"></div>
<div class="drawer" id="detail-drawer">
  <button class="drawer-close" id="drawer-close">✕</button>
  <div id="drawer-content"></div>
</div>

<!-- ── New Job modal ──────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="new-job-modal">
    <div class="modal-title">
      <span>New Standardization Job</span>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="step-indicator">
      <div class="step-dot active" id="sdot-0"></div>
      <div class="step-dot" id="sdot-1"></div>
    </div>

    <!-- Step 1: Select dataset -->
    <div class="modal-step active" id="mstep-0">
      <div class="section-title">Step 1 — Select Dataset</div>
      <div id="ds-pick-list" style="max-height:280px;overflow-y:auto">
        <div class="empty-state">Loading datasets…</div>
      </div>
      <div class="modal-footer">
        <span></span>
        <button class="btn btn-primary" id="btn-step2" disabled>Next →</button>
      </div>
    </div>

    <!-- Step 2: Select rules -->
    <div class="modal-step" id="mstep-1">
      <div class="section-title">Step 2 — Select Rules or Rule Set</div>

      <div style="font-size:.72rem;color:var(--color-text-dim);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Individual Rules</div>
      <div id="rule-pick-list" style="max-height:180px;overflow-y:auto;margin-bottom:4px">
        <div class="empty-state">Loading…</div>
      </div>

      <div class="or-divider">— or use a rule set —</div>

      <div class="field-group" style="margin-bottom:0">
        <label for="rset-pick">Rule Set</label>
        <select id="rset-pick"><option value="">None (use individual rules)</option></select>
      </div>

      <div id="preview-container"></div>

      <div class="modal-footer">
        <button class="btn btn-ghost" id="btn-back1">← Back</button>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost" id="btn-preview-job">Preview</button>
          <button class="btn btn-primary" id="btn-submit-job">Submit Job</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── Header ─────────────────────────────────────────────────── -->
<header class="header">
  <h1><span class="logo">DS</span> Jobs</h1>
  <nav class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="ingestion.html">Ingestion</a>
    <a href="rules.html">Rules</a>
    <a href="jobs.html" class="active">Jobs</a>
    <a href="logs.html">Logs</a>
  </nav>
</header>

<!-- ── Top bar ────────────────────────────────────────────────── -->
<div class="top-bar">
  <div class="top-bar-filters">
    <button class="filter-chip active" data-filter="">All</button>
    <button class="filter-chip" data-filter="QUEUED">Queued</button>
    <button class="filter-chip" data-filter="PROCESSING">Running</button>
    <button class="filter-chip" data-filter="COMPLETED">Completed</button>
    <button class="filter-chip" data-filter="FAILED">Failed</button>
  </div>
  <button class="btn btn-primary" id="btn-new-job">+ New Job</button>
</div>

<!-- ── Job table ──────────────────────────────────────────────── -->
<div class="panel">
  <div class="job-table-wrap">
    <table class="job-table" id="job-table">
      <thead>
        <tr>
          <th>Job ID</th>
          <th>Dataset</th>
          <th>Status</th>
          <th>Progress</th>
          <th>Records</th>
          <th>Errors</th>
          <th>Started</th>
          <th>Duration</th>
        </tr>
      </thead>
      <tbody id="job-tbody">
        <tr><td colspan="8" class="empty-state">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="preview-panel.js"></script>
<script>
(function () {
  'use strict';

  var GW = location.protocol + '//' + location.hostname + ':8080';

  /* ── Helpers ────────────────────────────────────────────────── */
  function $(s) { return document.querySelector(s); }
  function $$(s) { return document.querySelectorAll(s); }
  function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML.replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
  function shortId(u) { return u ? u.substring(0, 8) : '—'; }
  function fmtDate(iso) { if (!iso) return '—'; var d = new Date(iso); return isNaN(d) ? '—' : d.toLocaleString(); }
  function fmtTime(iso) { if (!iso) return '—'; var d = new Date(iso); return isNaN(d) ? '—' : d.toLocaleTimeString(); }
  function fmtDur(startIso, endIso) {
    if (!startIso) return '—';
    var s = new Date(startIso);
    var e = endIso ? new Date(endIso) : new Date();
    var ms = e - s;
    if (ms < 0) return '—';
    if (ms < 1000) return ms + 'ms';
    var sec = ms / 1000;
    if (sec < 60) return sec.toFixed(1) + 's';
    return Math.floor(sec / 60) + 'm ' + Math.round(sec % 60) + 's';
  }
  function toast(msg, type) {
    var el = document.createElement('div');
    el.className = 'toast ' + (type || 'success');
    el.textContent = msg;
    $('#toasts').appendChild(el);
    setTimeout(function () { el.remove(); }, 4000);
  }
  function copyText(text) {
    navigator.clipboard.writeText(text).then(function () { toast('Copied'); }).catch(function () {});
  }
  function downloadBlob(content, filename, mime) {
    var blob = new Blob([content], { type: mime });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(function () { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
  }

  /* ── State ──────────────────────────────────────────────────── */
  var allJobs = [];
  var statusFilter = '';
  var selectedJobId = null;
  var pollTimer = null;

  /* ── Filter chips ───────────────────────────────────────────── */
  $$('.filter-chip').forEach(function (chip) {
    chip.addEventListener('click', function () {
      $$('.filter-chip').forEach(function (c) { c.classList.remove('active'); });
      this.classList.add('active');
      statusFilter = this.dataset.filter;
      renderTable();
    });
  });

  /* ── Load & poll jobs ───────────────────────────────────────── */
  function loadJobs() {
    fetch(GW + '/api/standardization/jobs')
      .then(function (r) { return r.json(); })
      .then(function (jobs) {
        allJobs = jobs;
        renderTable();
      })
      .catch(function () {
        $('#job-tbody').innerHTML = '<tr><td colspan="8" class="empty-state">Could not load jobs</td></tr>';
      });
  }

  function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(loadJobs, 3000);
  }

  function renderTable() {
    var filtered = statusFilter
      ? allJobs.filter(function (j) { return j.status === statusFilter; })
      : allJobs;

    // sort: running/queued first, then by createdAt desc
    var order = { PROCESSING: 0, QUEUED: 1, COMPLETED: 2, FAILED: 3 };
    filtered.sort(function (a, b) {
      var o = (order[a.status] || 9) - (order[b.status] || 9);
      if (o !== 0) return o;
      return new Date(b.createdAt) - new Date(a.createdAt);
    });

    var tbody = $('#job-tbody');
    if (!filtered.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty-state">No jobs found</td></tr>';
      return;
    }

    tbody.innerHTML = filtered.map(function (j) {
      var pct = (j.progressPercentage || 0).toFixed(1);
      var sel = j.jobId === selectedJobId ? ' selected' : '';
      return '<tr class="clickable' + sel + '" data-jid="' + j.jobId + '">' +
        '<td class="mono">' + shortId(j.jobId) + '</td>' +
        '<td class="mono">' + shortId(j.datasetId) + '</td>' +
        '<td><span class="status-badge ' + escHtml(j.status) + '">' + escHtml(j.status) + '</span></td>' +
        '<td><div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div><div class="progress-text">' + pct + '%</div></td>' +
        '<td>' + (j.processedRecords || 0) + ' / ' + (j.totalRecords || 0) + '</td>' +
        '<td>' + (j.errorCount || 0) + '</td>' +
        '<td style="font-size:.74rem">' + fmtTime(j.startedAt) + '</td>' +
        '<td style="font-size:.74rem">' + fmtDur(j.startedAt, j.completedAt) + '</td>' +
      '</tr>';
    }).join('');

    tbody.querySelectorAll('tr.clickable').forEach(function (tr) {
      tr.addEventListener('click', function () { openDrawer(this.dataset.jid); });
    });
  }

  loadJobs();
  startPolling();

  /* ── Detail drawer ──────────────────────────────────────────── */
  function openDrawer(jobId) {
    selectedJobId = jobId;
    renderTable(); // highlight
    var job = allJobs.find(function (j) { return j.jobId === jobId; });
    if (!job) return;

    var traceId = jobId; // use jobId as trace correlation
    var dc = $('#drawer-content');

    var html = '<div class="drawer-header"><h2>Job ' + shortId(jobId) + '</h2></div>';
    html += '<div class="detail-grid">';
    html += detailItem('Job ID', jobId, true);
    html += detailItem('Dataset ID', job.datasetId, true);
    html += detailItem('Status', '<span class="status-badge ' + escHtml(job.status) + '">' + escHtml(job.status) + '</span>', false, true);
    html += detailItem('Progress', (job.progressPercentage || 0).toFixed(1) + '%');
    html += detailItem('Records', (job.processedRecords || 0) + ' / ' + (job.totalRecords || 0));
    html += detailItem('Errors', String(job.errorCount || 0));
    html += detailItem('Started', fmtDate(job.startedAt));
    html += detailItem('Completed', fmtDate(job.completedAt));
    html += detailItem('Created', fmtDate(job.createdAt));
    html += detailItem('X-Trace-Id', traceId, true);
    html += '</div>';

    if (job.status === 'FAILED') {
      html += '<div class="section-title">Error</div>';
      html += '<div class="error-box" id="error-box">Loading error details…</div>';
    }

    if (job.status === 'COMPLETED') {
      html += '<div class="section-title">Result</div>';
      html += '<div class="export-bar">' +
        '<button class="btn btn-success btn-sm" id="btn-export-csv">⬇ Export CSV</button>' +
        '<button class="btn btn-success btn-sm" id="btn-export-json">⬇ Export JSON</button>' +
      '</div>';
      html += '<div class="result-table-wrap" id="result-wrap">Loading results…</div>';
    }

    dc.innerHTML = html;

    // bind copy buttons
    dc.querySelectorAll('.copy-btn').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        copyText(this.dataset.copy);
      });
    });

    // fetch result for COMPLETED or error for FAILED
    if (job.status === 'COMPLETED' || job.status === 'FAILED') {
      fetch(GW + '/api/standardization/jobs/' + jobId + '/result')
        .then(function (r) { return r.json(); })
        .then(function (result) {
          if (job.status === 'FAILED') {
            var eb = $('#error-box');
            if (eb) eb.textContent = result.errorLog || 'No error details available.';
          }
          if (job.status === 'COMPLETED') {
            var records = result.standardizedRecords || [];
            renderResultTable(records);
            bindExports(records);
          }
        })
        .catch(function () {
          if (job.status === 'FAILED') {
            var eb2 = $('#error-box');
            if (eb2) eb2.textContent = 'Could not load error details.';
          }
        });
    }

    $('#drawer-overlay').classList.add('open');
    $('#detail-drawer').classList.add('open');
  }

  function detailItem(label, value, copyable, isHtml) {
    var valHtml;
    if (isHtml) {
      valHtml = value;
    } else if (typeof value === 'string' && value.length > 20) {
      valHtml = '<span title="' + escHtml(value) + '">' + escHtml(value) + '</span>';
    } else {
      valHtml = escHtml(value == null ? '—' : String(value));
    }
    var copyBtn = copyable ? '<button class="copy-btn" data-copy="' + escHtml(typeof value === 'string' ? value : '') + '">copy</button>' : '';
    return '<div class="detail-item"><div class="detail-label">' + escHtml(label) + '</div><div class="detail-value">' + valHtml + copyBtn + '</div></div>';
  }

  function renderResultTable(records) {
    var wrap = $('#result-wrap');
    if (!wrap) return;
    if (!records.length) { wrap.innerHTML = '<div class="empty-state">No records</div>'; return; }
    var cols = [];
    var colSet = {};
    records.forEach(function (r) {
      Object.keys(r).forEach(function (k) { if (!colSet[k]) { colSet[k] = true; cols.push(k); } });
    });
    var maxR = Math.min(records.length, 100);
    var html = '<table class="result-table"><thead><tr>';
    cols.forEach(function (c) { html += '<th>' + escHtml(c) + '</th>'; });
    html += '</tr></thead><tbody>';
    for (var i = 0; i < maxR; i++) {
      html += '<tr>';
      cols.forEach(function (c) { html += '<td>' + escHtml(records[i][c] == null ? '' : String(records[i][c])) + '</td>'; });
      html += '</tr>';
    }
    html += '</tbody></table>';
    if (records.length > maxR) html += '<div style="text-align:center;padding:6px;font-size:.7rem;color:var(--color-text-dim)">Showing ' + maxR + ' of ' + records.length + '</div>';
    wrap.innerHTML = html;
  }

  function bindExports(records) {
    var csvBtn = $('#btn-export-csv');
    var jsonBtn = $('#btn-export-json');
    if (!csvBtn || !jsonBtn || !records.length) return;
    var cols = Object.keys(records[0]);
    csvBtn.addEventListener('click', function () {
      var lines = [cols.map(function (c) { return '"' + c.replace(/"/g, '""') + '"'; }).join(',')];
      records.forEach(function (r) {
        lines.push(cols.map(function (c) { var v = r[c] == null ? '' : String(r[c]); return '"' + v.replace(/"/g, '""') + '"'; }).join(','));
      });
      downloadBlob(lines.join('\n'), 'job-result.csv', 'text/csv');
    });
    jsonBtn.addEventListener('click', function () {
      downloadBlob(JSON.stringify(records, null, 2), 'job-result.json', 'application/json');
    });
  }

  function closeDrawer() {
    $('#drawer-overlay').classList.remove('open');
    $('#detail-drawer').classList.remove('open');
    selectedJobId = null;
    renderTable();
  }
  $('#drawer-close').addEventListener('click', closeDrawer);
  $('#drawer-overlay').addEventListener('click', closeDrawer);

  /* ── New Job modal ──────────────────────────────────────────── */
  var modalStep = 0;
  var pickedDatasetId = null;
  var pickedRuleIds = [];
  var pickedRuleSetId = null;
  var datasetsCache = [];
  var rulesCache = [];
  var ruleSetsCache = [];

  function openModal() {
    modalStep = 0;
    pickedDatasetId = null;
    pickedRuleIds = [];
    pickedRuleSetId = null;
    $('#rset-pick').value = '';
    $('#preview-container').innerHTML = '';
    showStep(0);
    loadModalData();
    $('#modal-overlay').classList.add('open');
  }
  function closeModal() { $('#modal-overlay').classList.remove('open'); }

  $('#btn-new-job').addEventListener('click', openModal);
  $('#modal-close').addEventListener('click', closeModal);
  $('#modal-overlay').addEventListener('click', function (e) { if (e.target === this) closeModal(); });

  function showStep(n) {
    modalStep = n;
    $$('.modal-step').forEach(function (s, i) { s.classList.toggle('active', i === n); });
    for (var i = 0; i < 2; i++) {
      var dot = $('#sdot-' + i);
      dot.className = 'step-dot' + (i < n ? ' done' : '') + (i === n ? ' active' : '');
    }
  }

  $('#btn-step2').addEventListener('click', function () { if (pickedDatasetId) showStep(1); });
  $('#btn-back1').addEventListener('click', function () { showStep(0); });

  function loadModalData() {
    // datasets
    fetch(GW + '/api/ingestion/datasets').then(function (r) { return r.json(); }).then(function (ds) {
      datasetsCache = ds;
      var el = $('#ds-pick-list');
      if (!ds.length) { el.innerHTML = '<div class="empty-state">No datasets available</div>'; return; }
      el.innerHTML = ds.map(function (d) {
        return '<div class="select-card" data-dsid="' + d.datasetId + '">' +
          '<div class="sc-name">' + escHtml(d.name) + '</div>' +
          '<div class="sc-meta">' + d.recordCount + ' records · ' + escHtml(d.sourceType) + ' · ' + escHtml(d.status) + '</div>' +
        '</div>';
      }).join('');
      el.querySelectorAll('.select-card').forEach(function (card) {
        card.addEventListener('click', function () {
          el.querySelectorAll('.select-card').forEach(function (c) { c.classList.remove('selected'); });
          this.classList.add('selected');
          pickedDatasetId = this.dataset.dsid;
          $('#btn-step2').disabled = false;
        });
      });
    }).catch(function () {
      $('#ds-pick-list').innerHTML = '<div class="empty-state">Failed to load datasets</div>';
    });

    // rules
    fetch(GW + '/api/rules').then(function (r) { return r.json(); }).then(function (rules) {
      rulesCache = rules;
      var el = $('#rule-pick-list');
      if (!rules.length) { el.innerHTML = '<div class="empty-state">No rules</div>'; return; }
      el.innerHTML = rules.map(function (r) {
        return '<label class="rule-check">' +
          '<input type="checkbox" value="' + r.id + '">' +
          '<span class="rule-check-label">' + escHtml(r.name) + ' <span class="rule-check-type" style="background:var(--color-accent-glow);color:var(--color-accent)">' + escHtml(r.ruleType) + '</span></span>' +
        '</label>';
      }).join('');
      el.querySelectorAll('input[type=checkbox]').forEach(function (cb) {
        cb.addEventListener('change', function () {
          pickedRuleIds = [];
          el.querySelectorAll('input[type=checkbox]:checked').forEach(function (c) { pickedRuleIds.push(c.value); });
        });
      });
    }).catch(function () {
      $('#rule-pick-list').innerHTML = '<div class="empty-state">Failed to load rules</div>';
    });

    // rule sets
    fetch(GW + '/api/rules/rulesets').then(function (r) { return r.json(); }).then(function (rsets) {
      ruleSetsCache = rsets;
      var sel = $('#rset-pick');
      sel.innerHTML = '<option value="">None (use individual rules)</option>';
      rsets.forEach(function (rs) {
        sel.innerHTML += '<option value="' + rs.id + '">' + escHtml(rs.name) + ' (' + (rs.ruleIds ? rs.ruleIds.length : 0) + ' rules)</option>';
      });
    }).catch(function () {});
  }

  /* ── Preview ────────────────────────────────────────────────── */
  $('#btn-preview-job').addEventListener('click', function () {
    if (!pickedDatasetId) { toast('Select a dataset first', 'error'); return; }
    var rsetVal = $('#rset-pick').value;
    var payload = { datasetId: pickedDatasetId };
    if (rsetVal) { payload.ruleSetId = rsetVal; }
    else if (pickedRuleIds.length) { payload.ruleIds = pickedRuleIds; }
    else { toast('Select rules or a rule set', 'error'); return; }

    var btn = this;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Previewing…';

    // Fetch original records first
    var t0 = Date.now();
    Promise.all([
      fetch(GW + '/api/ingestion/datasets/' + pickedDatasetId).then(function (r) { return r.json(); }),
      fetch(GW + '/api/standardization/preview?maxRecords=10', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }).then(function (r) { if (!r.ok) throw new Error('Preview failed'); return r.json(); })
    ]).then(function (results) {
      var ds = results[0];
      var previewResult = results[1];
      var elapsed = Date.now() - t0;
      var original = [];
      try { original = JSON.parse(ds.rawData || '[]').slice(0, 10); } catch (e) {}
      var container = $('#preview-container');
      if (typeof PreviewPanel !== 'undefined') {
        // Build changedFields map from selected rules
        var cfMap = {};
        rulesCache.forEach(function (r) {
          if (pickedRuleIds.indexOf(r.id) !== -1) cfMap[r.fieldName] = r.name;
        });
        PreviewPanel.render(container, {
          original: original,
          standardized: previewResult.standardizedRecords || [],
          changedFields: cfMap,
          elapsedMs: elapsed
        });
      } else {
        container.innerHTML = '<div class="empty-state">Preview panel not available</div>';
      }
    }).catch(function (e) {
      toast('Preview failed: ' + e.message, 'error');
      $('#preview-container').innerHTML = '';
    }).finally(function () {
      btn.disabled = false;
      btn.textContent = 'Preview';
    });
  });

  /* ── Submit job ─────────────────────────────────────────────── */
  $('#btn-submit-job').addEventListener('click', function () {
    if (!pickedDatasetId) { toast('Select a dataset', 'error'); return; }
    var rsetVal = $('#rset-pick').value;
    var payload = { datasetId: pickedDatasetId };
    if (rsetVal) { payload.ruleSetId = rsetVal; }
    else if (pickedRuleIds.length) { payload.ruleIds = pickedRuleIds; }
    else { toast('Select rules or a rule set', 'error'); return; }

    var btn = this;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Submitting…';

    fetch(GW + '/api/standardization/process', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
      .then(function (r) {
        if (!r.ok) return r.text().then(function (t) { throw new Error(t); });
        return r.json();
      })
      .then(function (data) {
        toast('Job submitted: ' + shortId(data.jobId));
        closeModal();
        loadJobs();
      })
      .catch(function (e) { toast('Submit failed: ' + e.message, 'error'); })
      .finally(function () { btn.disabled = false; btn.textContent = 'Submit Job'; });
  });

})();
</script>
</body>
</html>
