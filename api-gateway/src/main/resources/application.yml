server:
  port: 8080

spring:
  application:
    name: api-gateway
  webflux:
    static-path-pattern: /**
  web:
    resources:
      static-locations: classpath:/static/
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: data-ingestion-service
          uri: lb://data-ingestion-service
          predicates:
            - Path=/api/ingestion/**
        - id: rule-engine-service
          uri: lb://rule-engine-service
          predicates:
            - Path=/api/rules/**
        - id: standardization-service
          uri: lb://standardization-service
          predicates:
            - Path=/api/standardization/**
        - id: data-quality-service
          uri: lb://data-quality-service
          predicates:
            - Path=/api/quality/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: w3c,b3

logging:
  loki:
    url: http://localhost:3100/loki/api/v1/push

