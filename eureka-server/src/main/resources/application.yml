server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
  server:
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 15000          # run eviction every 15 s (default 60 s)
    expected-client-renewal-interval-seconds: 10   # clients heartbeat every 10 s

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  loki:
    url: http://localhost:3100/loki/api/v1/push

